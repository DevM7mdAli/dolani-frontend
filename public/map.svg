<svg viewBox="0 0 4000 3000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

<defs>
    <pattern id="desk-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
        <rect x="10" y="10" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="10" y="22" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        <rect x="32" y="10" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="32" y="22" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        <rect x="10" y="40" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="10" y="52" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        <rect x="32" y="40" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="32" y="52" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
    </pattern>

    <pattern id="seat-pattern" x="0" y="0" width="30" height="25" patternUnits="userSpaceOnUse">
        <rect x="2" y="5" width="26" height="15" fill="#f0f0f0" stroke="#777" stroke-width="1.5" rx="3"/>
        <line x1="2" y1="12" x2="28" y2="12" stroke="#777" stroke-width="1"/>
    </pattern>

    <pattern id="grid-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>

    <g id="wing-module">
        <path d="M 0,-250 L 850,-250 L 950,-150 L 950,150 L 850,250 L 0,250 Z" fill="#ececec" stroke="#5a5a5a" stroke-width="2"/>
        
        <rect x="0" y="-80" width="900" height="160" fill="#ffffff" stroke="#7a7a7a" stroke-width="2"/>
        
        <circle cx="200" cy="-80" r="12" fill="#333"/>
        <circle cx="500" cy="-80" r="12" fill="#333"/>
        <circle cx="800" cy="-80" r="12" fill="#333"/>
        <circle cx="200" cy="80" r="12" fill="#333"/>
        <circle cx="500" cy="80" r="12" fill="#333"/>
        <circle cx="800" cy="80" r="12" fill="#333"/>

        <rect x="80" y="-230" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="300" y="-230" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="520" y="-230" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="740" y="-230" width="110" height="150" fill="#fdfdfd" stroke="#666" stroke-width="2"/>

        <rect x="80" y="80" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="300" y="80" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="520" y="80" width="220" height="150" fill="url(#desk-pattern)" stroke="#666" stroke-width="2"/>
        <rect x="740" y="80" width="110" height="150" fill="#fdfdfd" stroke="#666" stroke-width="2"/>

        <path d="M 950,-50 L 1050,-50 A 50 50 0 0 1 1050 50 L 950,50 Z" fill="#ececec" stroke="#5a5a5a" stroke-width="4"/>
        <circle cx="1060" cy="0" r="30" fill="none" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square"/>
        
        <line x1="80" y1="-80" x2="80" y2="-120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        <line x1="300" y1="-80" x2="300" y2="-120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        <line x1="520" y1="-80" x2="520" y2="-120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        
        <line x1="80" y1="80" x2="80" y2="120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        <line x1="300" y1="80" x2="300" y2="120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        <line x1="520" y1="80" x2="520" y2="120" stroke="#5a5a5a" stroke-width="4" fill="none"/>
        
        <line x1="80" y1="-230" x2="300" y2="-80" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
        <line x1="300" y1="-230" x2="520" y2="-80" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
        <line x1="520" y1="-230" x2="740" y2="-80" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
        
        <line x1="80" y1="80" x2="300" y2="230" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
        <line x1="300" y1="80" x2="520" y2="230" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
        <line x1="520" y1="80" x2="740" y2="230" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
    </g>
</defs>

<rect width="4000" height="3000" fill="#ffffff" />

<g id="center-hub">
    <polygon points="1500,1200 1700,1000 2300,1000 2500,1200 2500,1800 2300,2000 1700,2000 1500,1800" fill="url(#grid-pattern)" stroke="#5a5a5a" stroke-width="2"/>
    
    <rect x="1750" y="1050" width="500" height="400" fill="#fdfdfd" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square"/>
    <rect x="1800" y="1100" width="400" height="280" fill="url(#seat-pattern)" stroke="#5a5a5a" stroke-width="4"/>
    
    <rect x="1800" y="1380" width="400" height="50" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
    <path d="M 1900,1400 Q 2000,1430 2100,1400" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    
    <rect x="1650" y="1050" width="80" height="400" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
    <rect x="2270" y="1050" width="80" height="400" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
    
    <line x1="1500" y1="1500" x2="1750" y2="1500" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    <line x1="2250" y1="1500" x2="2500" y2="1500" stroke="#7a7a7a" stroke-width="2" fill="none"/>
</g>

<g id="top-block">
    <rect x="1650" y="250" width="700" height="750" fill="url(#grid-pattern)" stroke="#5a5a5a" stroke-width="2"/>
    
    <rect x="1750" y="350" width="300" height="250" fill="url(#desk-pattern)" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square"/>
    <rect x="2100" y="350" width="150" height="150" fill="#fdfdfd" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square"/>
    
    <rect x="1650" y="250" width="100" height="750" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
    <rect x="2250" y="250" width="100" height="750" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
    
    <circle cx="2000" cy="200" r="80" fill="#ececec" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square"/>
    <rect x="1950" y="150" width="100" height="100" fill="#fdfdfd" stroke="#5a5a5a" stroke-width="4"/>
</g>

<g id="bottom-block">
    <path d="M 1700,2000 L 2300,2000 L 2300,2400 L 1700,2400 Z" fill="#ececec" stroke="#5a5a5a" stroke-width="2"/>
    
    <rect x="1750" y="2000" width="500" height="150" fill="#fdfdfd" stroke="#7a7a7a" stroke-width="2"/>
    <rect x="1800" y="2050" width="400" height="80" stroke="#7a7a7a" stroke-width="2" fill="#fafafa"/>
    
    <rect x="1750" y="2400" width="500" height="150" stroke="#4a4a4a" stroke-width="8" stroke-linecap="square" fill="#f5f5f5"/>
    <line x1="1750" y1="2430" x2="2250" y2="2430" stroke="#5a5a5a" stroke-width="4" fill="none"/>
    <line x1="1750" y1="2460" x2="2250" y2="2460" stroke="#5a5a5a" stroke-width="4" fill="none"/>
    <line x1="1750" y1="2490" x2="2250" y2="2490" stroke="#5a5a5a" stroke-width="4" fill="none"/>
    <line x1="1750" y1="2520" x2="2250" y2="2520" stroke="#5a5a5a" stroke-width="4" fill="none"/>
    
    <polygon points="1600,2200 1700,2100 1700,2300" fill="#ececec" stroke="#5a5a5a" stroke-width="4"/>
    <polygon points="2400,2200 2300,2100 2300,2300" fill="#ececec" stroke="#5a5a5a" stroke-width="4"/>
</g>

<g transform="translate(1550, 1150) rotate(-142)">
    <use xlink:href="#wing-module" />
</g>

<g transform="translate(2450, 1150) rotate(-38)">
    <use xlink:href="#wing-module" />
</g>

<g transform="translate(1550, 1850) rotate(142)">
    <use xlink:href="#wing-module" />
</g>

<g transform="translate(2450, 1850) rotate(38)">
    <use xlink:href="#wing-module" />
</g>


<g transform="translate(1080, 1400)">
    <rect x="0" y="0" width="120" height="200" fill="#fdfdfd" stroke="#4a4a4a" stroke-width="6" stroke-dasharray="20 15"/>
    <line x1="0" y1="50" x2="120" y2="50" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    <line x1="0" y1="150" x2="120" y2="150" stroke="#7a7a7a" stroke-width="2" fill="none"/>
</g>

<g transform="translate(2800, 1400)">
    <rect x="0" y="0" width="120" height="200" fill="#fdfdfd" stroke="#4a4a4a" stroke-width="6" stroke-dasharray="20 15"/>
    <line x1="0" y1="50" x2="120" y2="50" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#7a7a7a" stroke-width="2" fill="none"/>
    <line x1="0" y1="150" x2="120" y2="150" stroke="#7a7a7a" stroke-width="2" fill="none"/>
</g>

<text x="750" y="1150" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="#111" text-anchor="middle">الدراسات العليا</text>

<text x="600" y="1550" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="#111" text-anchor="end">بوابة الدخول</text>

<text x="3400" y="1550" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="#111" text-anchor="start">بوابة الدخول</text>

<text x="2000" y="1580" font-family="Arial, sans-serif" font-size="130" font-weight="bold" fill="#111" text-anchor="middle">المسرح</text>

<text x="2000" y="2750" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#111" text-anchor="middle">البوابة الرئيسية</text>

<text x="1250" y="2750" font-family="'Times New Roman', serif" font-size="150" font-weight="bold" fill="#111" text-anchor="middle">A11</text>

</svg>