<svg viewBox="0 0 4000 3000" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff;">

<style>
    /* Architectural Blueprint Styles */
    .wall-thick { stroke: #4a4a4a; stroke-width: 8; fill: none; stroke-linecap: square; }
    .wall-medium { stroke: #5a5a5a; stroke-width: 4; fill: none; }
    .wall-thin { stroke: #7a7a7a; stroke-width: 2; fill: none; }
    .wall-dashed { stroke: #4a4a4a; stroke-width: 6; fill: none; stroke-dasharray: 20 15; }
    
    .room-fill { fill: #fdfdfd; stroke: #666; stroke-width: 2; }
    .corridor-fill { fill: #ffffff; }
    .poche { fill: #ececec; stroke: #5a5a5a; stroke-width: 2; }
    
    /* Patterns */
    .pattern-desks { fill: url(#desk-pattern); }
    .pattern-seats { fill: url(#seat-pattern); }
    .pattern-grid { fill: url(#grid-pattern); }

    /* Text Styles */
    .text-arabic { font-family: 'Segoe UI', Arial, sans-serif; font-size: 110px; font-weight: bold; fill: #111; }
    .text-english { font-family: 'Times New Roman', serif; font-size: 100px; font-weight: bold; fill: #111; }
    
    .label-center { text-anchor: middle; }
    .label-left { text-anchor: end; }
    .label-right { text-anchor: start; }
</style>

<defs>
    <pattern id="desk-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
        <rect x="10" y="10" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="10" y="22" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        
        <rect x="32" y="10" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="32" y="22" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        
        <rect x="10" y="40" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="10" y="52" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
        
        <rect x="32" y="40" width="18" height="12" fill="#fff" stroke="#888" stroke-width="1.5"/>
        <rect x="32" y="52" width="18" height="6" fill="#ddd" stroke="#888" stroke-width="1"/>
    </pattern>

    <pattern id="seat-pattern" x="0" y="0" width="30" height="25" patternUnits="userSpaceOnUse">
        <rect x="2" y="5" width="26" height="15" fill="#f0f0f0" stroke="#777" stroke-width="1.5" rx="3"/>
        <line x1="2" y1="12" x2="28" y2="12" stroke="#777" stroke-width="1"/>
    </pattern>

    <pattern id="grid-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>

    <g id="wing-module">
        <path d="M 0,-250 L 850,-250 L 950,-150 L 950,150 L 850,250 L 0,250 Z" class="poche"/>
        
        <rect x="0" y="-80" width="900" height="160" class="corridor-fill wall-thin"/>
        
        <circle cx="200" cy="-80" r="12" fill="#333"/>
        <circle cx="500" cy="-80" r="12" fill="#333"/>
        <circle cx="800" cy="-80" r="12" fill="#333"/>
        <circle cx="200" cy="80" r="12" fill="#333"/>
        <circle cx="500" cy="80" r="12" fill="#333"/>
        <circle cx="800" cy="80" r="12" fill="#333"/>

        <rect x="80" y="-230" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="300" y="-230" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="520" y="-230" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="740" y="-230" width="110" height="150" class="room-fill"/>

        <rect x="80" y="80" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="300" y="80" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="520" y="80" width="220" height="150" class="room-fill pattern-desks"/>
        <rect x="740" y="80" width="110" height="150" class="room-fill"/>

        <path d="M 950,-50 L 1050,-50 A 50 50 0 0 1 1050 50 L 950,50 Z" class="poche wall-medium"/>
        <circle cx="1060" cy="0" r="30" class="wall-thick"/>
        
        <line x1="80" y1="-80" x2="80" y2="-120" class="wall-medium"/>
        <line x1="300" y1="-80" x2="300" y2="-120" class="wall-medium"/>
        <line x1="520" y1="-80" x2="520" y2="-120" class="wall-medium"/>
        
        <line x1="80" y1="80" x2="80" y2="120" class="wall-medium"/>
        <line x1="300" y1="80" x2="300" y2="120" class="wall-medium"/>
        <line x1="520" y1="80" x2="520" y2="120" class="wall-medium"/>
        
        <line x1="80" y1="-230" x2="300" y2="-80" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
        <line x1="300" y1="-230" x2="520" y2="-80" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
        <line x1="520" y1="-230" x2="740" y2="-80" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
        
        <line x1="80" y1="80" x2="300" y2="230" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
        <line x1="300" y1="80" x2="520" y2="230" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
        <line x1="520" y1="80" x2="740" y2="230" class="wall-thin" stroke-dasharray="5 5" stroke="#ccc"/>
    </g>
</defs>

<rect width="4000" height="3000" fill="#ffffff" />

<g id="center-hub">
    <polygon points="1500,1200 1700,1000 2300,1000 2500,1200 2500,1800 2300,2000 1700,2000 1500,1800" class="poche pattern-grid"/>
    
    <rect x="1750" y="1050" width="500" height="400" class="room-fill wall-thick"/>
    <rect x="1800" y="1100" width="400" height="280" class="pattern-seats wall-medium"/>
    
    <rect x="1800" y="1380" width="400" height="50" class="room-fill wall-medium"/>
    <path d="M 1900,1400 Q 2000,1430 2100,1400" class="wall-thin"/>
    
    <rect x="1650" y="1050" width="80" height="400" class="room-fill wall-medium"/>
    <rect x="2270" y="1050" width="80" height="400" class="room-fill wall-medium"/>
    
    <line x1="1500" y1="1500" x2="1750" y2="1500" class="wall-thin"/>
    <line x1="2250" y1="1500" x2="2500" y2="1500" class="wall-thin"/>
</g>

<g id="top-block">
    <rect x="1650" y="250" width="700" height="750" class="poche pattern-grid"/>
    
    <rect x="1750" y="350" width="300" height="250" class="room-fill wall-thick pattern-desks"/>
    <rect x="2100" y="350" width="150" height="150" class="room-fill wall-thick"/>
    
    <rect x="1650" y="250" width="100" height="750" class="room-fill wall-medium"/>
    <rect x="2250" y="250" width="100" height="750" class="room-fill wall-medium"/>
    
    <circle cx="2000" cy="200" r="80" class="poche wall-thick"/>
    <rect x="1950" y="150" width="100" height="100" class="room-fill wall-medium"/>
</g>

<g id="bottom-block">
    <path d="M 1700,2000 L 2300,2000 L 2300,2400 L 1700,2400 Z" class="poche"/>
    
    <rect x="1750" y="2000" width="500" height="150" class="room-fill wall-thin"/>
    <rect x="1800" y="2050" width="400" height="80" class="wall-thin" fill="#fafafa"/>
    
    <rect x="1750" y="2400" width="500" height="150" class="wall-thick" fill="#f5f5f5"/>
    <line x1="1750" y1="2430" x2="2250" y2="2430" class="wall-medium"/>
    <line x1="1750" y1="2460" x2="2250" y2="2460" class="wall-medium"/>
    <line x1="1750" y1="2490" x2="2250" y2="2490" class="wall-medium"/>
    <line x1="1750" y1="2520" x2="2250" y2="2520" class="wall-medium"/>
    
    <polygon points="1600,2200 1700,2100 1700,2300" class="poche wall-medium"/>
    <polygon points="2400,2200 2300,2100 2300,2300" class="poche wall-medium"/>
</g>

<g transform="translate(1550, 1150) rotate(-142)">
    <use href="#wing-module" />
</g>

<g transform="translate(2450, 1150) rotate(-38)">
    <use href="#wing-module" />
</g>

<g transform="translate(1550, 1850) rotate(142)">
    <use href="#wing-module" />
</g>

<g transform="translate(2450, 1850) rotate(38)">
    <use href="#wing-module" />
</g>


<g transform="translate(1080, 1400)">
    <rect x="0" y="0" width="120" height="200" class="room-fill wall-dashed"/>
    <line x1="0" y1="50" x2="120" y2="50" class="wall-thin"/>
    <line x1="0" y1="100" x2="120" y2="100" class="wall-thin"/>
    <line x1="0" y1="150" x2="120" y2="150" class="wall-thin"/>
</g>

<g transform="translate(2800, 1400)">
    <rect x="0" y="0" width="120" height="200" class="room-fill wall-dashed"/>
    <line x1="0" y1="50" x2="120" y2="50" class="wall-thin"/>
    <line x1="0" y1="100" x2="120" y2="100" class="wall-thin"/>
    <line x1="0" y1="150" x2="120" y2="150" class="wall-thin"/>
</g>

<text x="750" y="1150" class="text-arabic label-center">الدراسات العليا</text>

<text x="600" y="1550" class="text-arabic label-left">بوابة الدخول</text>

<text x="3400" y="1550" class="text-arabic label-right">بوابة الدخول</text>

<text x="2000" y="1580" class="text-arabic label-center" style="font-size: 130px;">المسرح</text>

<text x="2000" y="2750" class="text-arabic label-center" style="font-size: 140px;">البوابة الرئيسية</text>

<text x="1250" y="2750" class="text-english label-center" style="font-size: 150px;">A11</text>

</svg>